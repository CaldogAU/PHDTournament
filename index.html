<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHDTournament</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">PHDTournament</p>
      <h1 id="pageTitle">Tournament Manager</h1>
      <p class="lede">A browser-based Swiss-style tournament manager.</p>
    </div>

    <div class="header-actions">
      <span id="saveStatus">Ready</span>
      <button id="themeToggle" type="button">Toggle Theme</button>
      <button id="resetTournament" class="danger" type="button">Reset</button>
    </div>
  </header>

  <main class="app-layout">
    <section class="card">
      <h2>Tournament Setup</h2>

      <label>
        Tournament Name
        <input id="tournamentName" type="text" />
      </label>

      <label>
        Description
        <textarea id="tournamentDescription" placeholder="Optional tournament notes"></textarea>
      </label>

      <div class="grid three">
        <label>
          Win Points
          <input id="winPoints" type="number" min="1" />
        </label>

        <label>
          Draw Points
          <input id="drawPoints" type="number" min="0" />
        </label>

        <label>
          Bye Points
          <input id="byePoints" type="number" min="0" />
        </label>
      </div>

      <button id="saveTournament" type="button">Save Tournament</button>
    </section>

    <section class="card">
      <h2>Current Tournament</h2>

      <dl class="summary-list">
        <div>
          <dt>Name</dt>
          <dd id="summaryName">—</dd>
        </div>
        <div>
          <dt>Description</dt>
          <dd id="summaryDescription">—</dd>
        </div>
        <div>
          <dt>Scoring</dt>
          <dd id="summaryScoring">—</dd>
        </div>
      </dl>
    </section>
  </main>

  <script src="js/state.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/teams.js"></script>
  <script src="js/ladder.js"></script>
  <script src="js/rounds.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
